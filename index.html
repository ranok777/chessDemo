<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Demo - Square Fix</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        .site-container {
            width: 100vw;
            height: 100vh;
            background-image: url('site_bg.png');
            background-size: cover;
            background-position: center;
            position: relative;
        }

        model-viewer {
            /* Жестко задаем квадрат через vw */
            /* 38vw — это примерно тот размер, который нужен под ваш макет */
            width: 40vw; 
            height: 40vw; 

            position: absolute;
            /* Подправил позицию, чтобы доска была ближе к центру игрового поля на фоне */
            left: 12%;  
            top: 10%;  
            
            /* Границы для настройки */
            

            --poster-color: transparent;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="site-container">
        <model-viewer 
            src="chessdemo.glb" 
            environment-image="nhdri.hdr" 
            exposure="1.2" 
            shadow-intensity="1.5"
            autoplay 
            camera-controls 
            interaction-prompt="none"
            /* 1.8m — чуть ближе, чтобы модель была крупнее внутри квадрата */
            camera-orbit="45deg 70deg 25m"
            field-of-view="25deg"
            alt="Chess Board">
        </model-viewer>
    </div>

</body>
</html>
